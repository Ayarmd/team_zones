# Koyeb — Git deploy for ZONES Laravel API (monorepo)
# Docs: deploy/DEPLOY.md
#
# In Koyeb UI you can also configure manually:
#   Build context / Work directory: zones-backend-laravel
#   Dockerfile: Dockerfile
#   Port: 8000
#   Health check path: /up

name: zones-api
services:
  - name: laravel-api
    git:
      repository: github.com/Ayarmd/team_zones
      branch: main
      workdir: zones-backend-laravel
    docker:
      dockerfile: Dockerfile
    instance_type: nano
    ports:
      - port: 8000
        protocol: http
    routes:
      - path: /
        port: 8000
    healthchecks:
      - grace_period: 60
        interval: 30
        restart_limit: 3
        timeout: 10
        http:
          path: /up
          port: 8000
