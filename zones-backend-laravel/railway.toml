# Railway: set Root Directory to zones-backend-laravel in the service settings.
# Free plan: no credit card to sign up — see deploy/DEPLOY.md and deploy/railway.env.example
#
# Prefer Dockerfile (includes scheduler for no-show):
#   Settings → Builder → Dockerfile
# Or use Nixpacks below:

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# Dockerfile entrypoint runs migrate + scheduler + serve — no startCommand override
healthcheckPath = "/up"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
